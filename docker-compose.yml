# TokenGo Docker Compose Configuration
# 
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# ⚠️  IMPORTANT: Change all passwords before deploying to production!

version: '3.4' # For compatibility with older Docker versions

services:
  tokengo:
    image: calciumion/new-api:latest
    container_name: tokengo
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:tokengo_secured_2026@postgres:5432/tokengo
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true

    depends_on:
      - redis
      - postgres
    networks:
      - tokengo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: tokengo-redis
    restart: always
    networks:
      - tokengo-network

  postgres:
    image: postgres:15
    container_name: tokengo-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: tokengo_secured_2026  # ⚠️ Change this before production!
      POSTGRES_DB: tokengo
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - tokengo-network

volumes:
  pg_data:

networks:
  tokengo-network:
    driver: bridge
